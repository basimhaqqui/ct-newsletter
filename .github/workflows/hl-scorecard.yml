name: HL Weekly Scorecard

# Weekly recap of the tracked wallets + auto-refresh suggestions (new top traders
# to add, decaying ones to prune). Sundays ~6-7am PT (14:00 UTC; weekly, so the
# DST hour-drift doesn't matter). Suggestions only — never edits wallets.json.
on:
  schedule:
    - cron: "0 14 * * 0"
  workflow_dispatch: {}

jobs:
  scorecard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ubuntu-latest ships Node 20+ (has fetch) — no setup-node needed.
      - name: Build & send scorecard
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node hl-scorecard.mjs
