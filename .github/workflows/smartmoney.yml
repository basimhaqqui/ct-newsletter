name: Smart Money

# Triggered by the bot's /smartmoney. Aggregates top HL traders' net positioning.
on:
  workflow_dispatch: {}

jobs:
  sm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Smart-money gauge
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node smartmoney.mjs
