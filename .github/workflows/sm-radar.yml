name: Smart-Money Shift Radar

# Every 6h: aggregates the top-50 HL traders' net positioning, diffs vs last run,
# and alerts when broad smart money SHIFTS (flips net side, hits strong consensus,
# or swings hard) on a coin. Free (Hyperliquid APIs only). On-demand snapshot is
# still the bot's /smartmoney.
on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  radar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detect smart-money shifts
        env:
          RADAR: "1"
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node smartmoney.mjs
      - name: Persist positioning snapshot
        run: |
          git add -f state/smartmoney.json
          if git diff --cached --quiet; then
            echo "no change"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "sm-radar: positioning snapshot [skip ci]"
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
            git push
          fi
