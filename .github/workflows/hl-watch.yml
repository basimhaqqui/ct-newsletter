name: HL Wallet Watch

# Polls the approved Hyperliquid wallets for position changes and alerts Telegram.
# Every 30 min keeps a private repo within GitHub's free 2,000 min/month. These
# are swing leverage positions, so 30-min granularity is fine. Want tighter? Make
# the repo public (free unlimited → drop to */15) or move to an always-on host.
on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write # to commit the position-state snapshot back

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ubuntu-latest ships Node 20+ (has fetch) — skip setup-node to save minutes.
      - name: Watch wallet positions
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node hl-watch.mjs

      - name: Persist state on change
        run: |
          git add -f state/hl-positions.json
          if git diff --cached --quiet; then
            echo "no state change — nothing to commit"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "hl-watch: position state update [skip ci]"
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
            git push
          fi
