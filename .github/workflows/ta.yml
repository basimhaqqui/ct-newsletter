name: TA

# Triggered by the bot's /ta <coin>. Multi-timeframe technical analysis +
# funding/OI + whale confluence, synthesized by Claude, sent to Telegram.
# Appends each read to state/ta-log.json (track record).
on:
  workflow_dispatch:
    inputs:
      coin:
        description: "coin (e.g. HYPE, BTC, SOL)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  ta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Analyze
        env:
          COIN: ${{ inputs.coin }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node ta.mjs
      - name: Persist TA log
        run: |
          git add -f state/ta-log.json 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "no log change"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git commit -m "ta: log read [skip ci]"
            git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
            git push
          fi
