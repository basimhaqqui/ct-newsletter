name: Daily CT Digest

# GitHub cron is UTC and does NOT observe daylight saving. 6 AM PT is 13:00 UTC
# (PDT, summer) or 14:00 UTC (PST, winter). We fire at both and let the guard
# step below proceed only when it's truly 6 AM in Los Angeles — so it runs
# exactly once per day year-round. Scheduled runs may be delayed by GitHub
# under load; that's fine for a daily digest.
on:
  schedule:
    - cron: "0 13,14 * * *"
  workflow_dispatch: {} # manual "Run workflow" button — skips the time guard

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Proceed only at 6 AM Los Angeles time (skip on manual dispatch)
        id: guard
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "manual run — skipping time guard"
            echo "go=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          HOUR=$(TZ=America/Los_Angeles date +%H)
          echo "Los Angeles hour: $HOUR"
          if [ "$HOUR" = "06" ]; then
            echo "go=true" >> "$GITHUB_OUTPUT"
          else
            echo "go=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Fetch tweets
        if: steps.guard.outputs.go == 'true'
        env:
          APIFY_TOKEN: ${{ secrets.APIFY_TOKEN }}
          TWITTER_LIST_ID: ${{ secrets.TWITTER_LIST_ID }}
          WINDOW_HOURS: "24"
          MAX_ITEMS: "200"
        run: node fetch.mjs > tweets.json

      - name: Market snapshot
        if: steps.guard.outputs.go == 'true'
        run: node market.mjs # non-fatal by design

      - name: Summarize
        if: steps.guard.outputs.go == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node summarize.mjs

      - name: Send to Telegram
        if: steps.guard.outputs.go == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node telegram.mjs

      - name: Save run inputs as artifact
        if: always() && steps.guard.outputs.go == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: digest-inputs-${{ github.run_id }}
          path: |
            tweets.json
            market.json
            digest.html
          retention-days: 14
          if-no-files-found: ignore

      - name: Alert me on failure
        if: failure() && steps.guard.outputs.go == 'true'
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=⚠️ CT Digest run failed today. Logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            > /dev/null
