name: v2 CI
on:
  push:
    paths: ['v2/**']
  pull_request:
    paths: ['v2/**']
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v2
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: v2/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Typecheck
        run: pnpm typecheck
      - name: Test (deterministic, leakage, calibration gates included)
        run: pnpm vitest run packages

  # Optional: full migration verification against a live Postgres
  test-postgres:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: v2
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: market_intel_test
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres" --health-interval 5s
          --health-timeout 5s --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: v2/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - name: Migration tests
        env:
          DATABASE_URL: postgres://postgres:test@localhost:5432/market_intel_test
        run: pnpm --filter @market-intel/db test
